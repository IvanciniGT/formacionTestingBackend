services:
  # Jenkins controller + Docker-in-Docker daemon (official Jenkins Docker install pattern).
  # Cloud note: do not expose DinD externally; publish only Jenkins web/agent ports.
  jenkins-docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    restart: unless-stopped
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - jenkins-docker-certs:/certs/client
      - jenkins-data:/var/jenkins_home
    networks:
      - devops
    command: ["--storage-driver", "overlay2"]

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    depends_on:
      - jenkins-docker
    environment:
      DOCKER_HOST: tcp://jenkins-docker:2376
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: "1"
    volumes:
      - jenkins-data:/var/jenkins_home
      - jenkins-docker-certs:/certs/client:ro
    networks:
      - devops
    ports:
      - "${JENKINS_HTTP_PORT:-8080}:8080"

  # SonarQube + PostgreSQL (based on SonarSource compose examples).
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    hostname: sonarqube
    read_only: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
    tmpfs:
      - /tmp:size=256M,mode=1777
    networks:
      - devops
    ports:
      - "${SONAR_HTTP_PORT:-8081}:9000"

  db:
    image: postgres:17
    container_name: postgresql
    hostname: postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgresql:/var/lib/postgresql
    networks:
      - devops

  # Selenium Grid Standalone (hub + nodo Chrome en un solo contenedor).
  # Acceso: http://localhost:8082  — los tests conectan via RemoteWebDriver a esa URL.
  # ── Selenium Grid distribuido (hub + nodes) ──
  # Selenium Grid (hub + nodes), following docker-selenium compose style.
  selenium-hub:
    image: selenium/hub:4.43.0-20260404
    container_name: selenium-hub
    restart: unless-stopped
    networks:
      - devops
    ports:
      - "${SELENIUM_HUB_PORT:-8082}:4444"

  chrome:
    image: selenium/node-chrome:4.43.0-20260404
    shm_size: 2gb
    restart: unless-stopped
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
    networks:
      - devops

  edge:
    image: selenium/node-edge:4.43.0-20260404
    shm_size: 2gb
    restart: unless-stopped
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
    networks:
      - devops

  firefox:
    image: selenium/node-firefox:4.43.0-20260404
    shm_size: 2gb
    restart: unless-stopped
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
    networks:
      - devops

  # ── Selenium Standalone (Chrome todo-en-uno) ── COMENTADO, usar Grid distribuido ──
  # selenium-standalone:
  #   image: selenium/standalone-chrome:4.43.0-20260404
  #   container_name: selenium-standalone
  #   shm_size: 2gb
  #   restart: unless-stopped
  #   networks:
  #     - devops
  #   ports:
  #     - "${SELENIUM_HUB_PORT:-8082}:4444"

volumes:
  jenkins-data:
  jenkins-docker-certs:
  sonarqube_data:
  sonarqube_temp:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql:

networks:
  devops:
    driver: bridge
